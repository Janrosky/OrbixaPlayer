<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Orbixa Music</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #DB2955;
  --red-light: #E6406C;
  --red-dark: #B01E42;
  --red-glow: rgba(219,41,85,0.22);
  --bg: #050816;
  --bg2: #0D1224;
  --surface: #1F2937;
  --surface2: #263244;
  --surface3: #2E3A50;
  --white: #F4F4F5;
  --muted: #A1A1AA;
  --muted2: #6B7280;
  --font: 'Space Grotesk', sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--white);
  display:flex;flex-direction:column;
  height:100dvh;
  max-width:430px;margin:0 auto;
  position:relative;overflow:hidden;
}

/* ── AMBIENT ── */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;transition:opacity 1s;}
.ambient::before{
  content:'';position:absolute;
  width:360px;height:360px;border-radius:50%;
  background:radial-gradient(circle,var(--red-glow) 0%,transparent 70%);
  top:-100px;left:50%;transform:translateX(-50%);
  filter:blur(50px);transition:opacity 1s;
}
.ambient::after{
  content:'';position:absolute;
  width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle,rgba(219,41,85,0.07) 0%,transparent 100%);
  bottom:80px;right:-60px;filter:blur(40px);
}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;height:100%;position:relative;z-index:1;overflow:hidden;}
.screen.active{display:flex;}

/* ══════════════════════════════════════
   LIBRARY SCREEN
══════════════════════════════════════ */
.lib-header{
  padding:52px 24px 8px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.lib-header h1{font-size:28px;font-weight:700;letter-spacing:-.5px;}
.lib-header h1 span{color:var(--red);}
.header-actions{display:flex;gap:8px;align-items:center;}

.upload-btn{
  display:flex;align-items:center;gap:7px;
  background:var(--red);color:#fff;
  border:none;border-radius:24px;
  padding:9px 16px;font-size:13px;font-weight:600;
  font-family:var(--font);cursor:pointer;
  transition:transform .15s,background .2s;
}
.upload-btn:active{transform:scale(.96);background:var(--red-light);}
.upload-btn svg{width:14px;height:14px;flex-shrink:0;}

.folder-btn{
  display:flex;align-items:center;gap:6px;
  background:var(--surface2);color:var(--muted);
  border:none;border-radius:24px;
  padding:9px 14px;font-size:13px;font-weight:500;
  font-family:var(--font);cursor:pointer;
  transition:transform .15s,background .2s;
}
.folder-btn:active{transform:scale(.96);}
.folder-btn svg{width:14px;height:14px;flex-shrink:0;}
#fileInput,#folderInput{display:none;}

.search-bar{
  margin:14px 24px 6px;
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border-radius:14px;
  padding:10px 16px;flex-shrink:0;
}
.search-bar svg{width:17px;height:17px;color:var(--muted);flex-shrink:0;}
.search-bar input{
  background:none;border:none;outline:none;
  color:var(--white);font-family:var(--font);font-size:15px;width:100%;
}
.search-bar input::placeholder{color:var(--muted2);}

.lib-filters{
  display:flex;gap:8px;padding:6px 24px 0;
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;
}
.lib-filters::-webkit-scrollbar{display:none;}
.filter-chip{
  flex-shrink:0;padding:5px 14px;
  border-radius:20px;border:1.5px solid var(--surface);
  background:none;color:var(--muted);
  font-family:var(--font);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;
}
.filter-chip.active{background:var(--red);border-color:var(--red);color:#fff;}

.stats-bar{
  display:flex;gap:12px;align-items:center;
  padding:8px 24px 2px;flex-shrink:0;
}
.stats-bar span{font-size:12px;color:var(--muted2);}
.stats-bar strong{color:var(--muted);font-weight:600;}

.load-bar{display:none;margin:4px 24px 0;background:var(--surface);border-radius:8px;overflow:hidden;height:3px;flex-shrink:0;}
.load-bar.visible{display:block;}
.load-bar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--red-light));border-radius:8px;width:0%;transition:width .3s ease;}

.song-list{flex:1;overflow-y:auto;padding:8px 0 110px;scrollbar-width:none;}
.song-list::-webkit-scrollbar{display:none;}

.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:14px;
  padding:0 40px;text-align:center;
}
.empty-icon{font-size:52px;opacity:.3;}
.empty-state h3{font-size:20px;font-weight:600;color:var(--muted);}
.empty-state p{font-size:14px;color:var(--muted2);line-height:1.6;}
.drop-hint{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border-radius:12px;
  padding:10px 16px;margin-top:8px;
  font-size:13px;color:var(--muted);
}

.song-row{
  display:flex;align-items:center;gap:12px;
  padding:9px 24px;cursor:pointer;
  transition:background .15s;position:relative;
}
.song-row:active{background:rgba(255,255,255,.04);}
.song-row.playing{background:rgba(219,41,85,.08);}
.song-row.paused{background:rgba(219,41,85,.04);}
.song-num{width:20px;text-align:center;font-size:13px;color:var(--muted2);flex-shrink:0;font-variant-numeric:tabular-nums;}
.song-row.playing .song-num,.song-row.paused .song-num{display:none;}
.song-thumb{
  width:48px;height:48px;border-radius:10px;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;position:relative;
}
.song-thumb img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.song-thumb svg{width:20px;height:20px;color:var(--muted2);}
.song-thumb .playing-indicator{
  position:absolute;inset:0;background:rgba(219,41,85,.85);
  display:none;align-items:center;justify-content:center;border-radius:10px;
}
.song-row.playing .playing-indicator{display:flex;}
.bars{display:flex;gap:3px;align-items:flex-end;height:18px;}
.bar{width:3px;background:#fff;border-radius:2px;animation:bounce .8s ease infinite;}
.bar:nth-child(2){animation-delay:.2s;}
.bar:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,100%{height:5px;}50%{height:16px;}}
.song-row.paused .bar{animation-play-state:paused;}
.song-info{flex:1;min-width:0;}
.song-info .title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--white);}
.song-row.playing .song-info .title{color:var(--red-light);}
.song-info .meta{font-size:12px;color:var(--muted);margin-top:2px;}
.song-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.song-duration{font-size:12px;color:var(--muted2);}
.song-like-mini{background:none;border:none;cursor:pointer;padding:2px;color:var(--muted2);transition:color .2s;}
.song-like-mini.liked{color:var(--red);}

/* drop overlay */
.drop-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(5,8,22,.9);
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
  border:2px dashed var(--red);border-radius:24px;
  margin:16px;pointer-events:none;
}
.drop-overlay.visible{display:flex;}
.drop-overlay svg{width:52px;height:52px;color:var(--red);opacity:.8;}
.drop-overlay h2{font-size:20px;font-weight:700;color:var(--red);}
.drop-overlay p{font-size:13px;color:var(--muted);}

/* toast */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--surface2);color:var(--white);border-radius:20px;
  padding:9px 18px;font-size:13px;font-weight:500;
  opacity:0;transition:opacity .25s,transform .25s;
  z-index:999;white-space:nowrap;pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══════════════════════════════════════
   BOTTOM TABS (shared)
══════════════════════════════════════ */
.bottom-tabs{
  display:flex;justify-content:space-around;
  padding:10px 0 calc(28px + var(--safe-bottom));
  border-top:1px solid rgba(255,255,255,.05);
  flex-shrink:0;background:rgba(5,8,22,.8);
  backdrop-filter:blur(20px);
}
.tab-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;padding:4px 16px;
  color:var(--muted2);transition:color .2s;
}
.tab-item.active{color:var(--red);}
.tab-item span{font-size:11px;font-weight:500;}

/* ══════════════════════════════════════
   MINI PLAYER
══════════════════════════════════════ */
.mini-player{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(13,18,36,.96);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(255,255,255,.06);
  padding:10px 16px calc(28px + var(--safe-bottom));
  display:none;align-items:center;gap:12px;
  z-index:100;cursor:pointer;
}
.mini-player.visible{display:flex;}
.mini-thumb{
  width:44px;height:44px;border-radius:10px;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;
}
.mini-thumb img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.mini-thumb svg{width:18px;height:18px;color:var(--muted);}
.mini-info{flex:1;min-width:0;}
.mini-info .t{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-info .a{font-size:12px;color:var(--muted);margin-top:1px;}
.mini-controls{display:flex;align-items:center;gap:6px;}
.mini-btn{
  background:none;border:none;cursor:pointer;
  color:var(--white);padding:6px;
  display:flex;align-items:center;border-radius:50%;
  transition:background .15s;
}
.mini-btn:active{background:rgba(255,255,255,.1);}
.mini-btn.play-pause{
  background:var(--red);border-radius:50%;
  width:36px;height:36px;justify-content:center;
  transition:transform .15s,background .15s;
  flex-shrink:0;
}
.mini-btn.play-pause:active{transform:scale(.92);}
.mini-progress{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--surface);}
.mini-progress-fill{height:100%;background:var(--red);width:0%;transition:width .5s linear;}

/* ══════════════════════════════════════
   PLAYER SCREEN — REDESIGNED
══════════════════════════════════════ */
#playerScreen{
  background:var(--bg);
  overflow:hidden;
}

/* Dynamic blurred bg from artwork */
.player-bg{
  position:absolute;inset:-40px;z-index:0;
  background-size:cover;background-position:center;
  filter:blur(60px) saturate(1.8) brightness(.35);
  transition:background-image 1s ease;
  opacity:0;
}
.player-bg.has-cover{opacity:1;}

.player-content{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  height:100%;overflow:hidden;
}

/* Header */
.player-header{
  padding:52px 20px 0;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.player-back-btn{
  background:rgba(255,255,255,.1);border:none;border-radius:50%;
  width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--white);
  backdrop-filter:blur(8px);
  transition:background .15s;
}
.player-back-btn:active{background:rgba(255,255,255,.2);}
.player-header-center{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  flex:1;
}
.player-header-center .eyebrow{
  font-size:11px;font-weight:600;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--muted);
}
.player-header-center .playlist-name{
  font-size:13px;font-weight:600;color:var(--white);
  max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.player-more-btn{
  background:rgba(255,255,255,.1);border:none;border-radius:50%;
  width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--white);backdrop-filter:blur(8px);
  transition:background .15s;
}
.player-more-btn:active{background:rgba(255,255,255,.2);}

/* Artwork */
.artwork-section{
  flex-shrink:0;
  padding:20px 40px 0;
  position:relative;
}
.artwork-container{
  position:relative;width:100%;aspect-ratio:1;
}
.artwork-shadow{
  position:absolute;bottom:-16px;left:10%;right:10%;height:30px;
  background:rgba(219,41,85,.25);
  filter:blur(20px);border-radius:50%;
  transition:opacity .5s;
}
.artwork{
  width:100%;height:100%;
  border-radius:20px;
  background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1),box-shadow .4s;
  box-shadow:0 16px 48px rgba(0,0,0,.5);
}
.artwork.playing{
  transform:scale(1.03);
  box-shadow:0 24px 64px rgba(0,0,0,.6),0 0 40px rgba(219,41,85,.15);
}
.artwork img{width:100%;height:100%;object-fit:cover;border-radius:20px;position:absolute;inset:0;}
.artwork svg{width:72px;height:72px;color:var(--surface2);}
.artwork-grid{
  position:absolute;inset:0;opacity:.04;pointer-events:none;
  background-image:
    repeating-linear-gradient(0deg,var(--red) 0,var(--red) 1px,transparent 0,transparent 32px),
    repeating-linear-gradient(90deg,var(--red) 0,var(--red) 1px,transparent 0,transparent 32px);
  background-size:32px 32px;
}

/* Track info */
.track-section{
  padding:20px 28px 0;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;gap:12px;
}
.track-text{flex:1;min-width:0;}
.marquee-wrap{overflow:hidden;min-width:0;}
.marquee-inner{display:inline-block;white-space:nowrap;}
.marquee-inner.scrolling{animation:marquee 5s linear infinite alternate;}
@keyframes marquee{0%,20%{transform:translateX(0);}80%,100%{transform:translateX(var(--scroll-dist,-60px));}}
.track-title{font-size:22px;font-weight:700;letter-spacing:-.3px;color:var(--white);}
.track-artist{font-size:14px;color:var(--muted);margin-top:3px;}
.track-album{font-size:12px;color:var(--muted2);margin-top:1px;}
.like-btn{
  background:none;border:none;cursor:pointer;
  color:var(--muted);flex-shrink:0;
  transition:transform .2s,color .2s;padding:4px;
}
.like-btn.liked{color:var(--red);}
.like-btn:active{transform:scale(1.3);}

/* Progress */
.progress-section{padding:16px 28px 0;flex-shrink:0;}
.progress-bar-bg{
  height:4px;background:rgba(255,255,255,.12);border-radius:2px;
  position:relative;cursor:pointer;
  touch-action:none;
}
.progress-bar-bg:hover{height:6px;margin-top:-1px;}
.progress-bar-fill{
  height:100%;background:linear-gradient(90deg,var(--red),var(--red-light));
  border-radius:2px;width:0%;
  transition:width .5s linear;position:relative;
}
.progress-bar-fill::after{
  content:'';
  position:absolute;right:-7px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;
  background:var(--white);border-radius:50%;
  box-shadow:0 0 0 3px var(--red);
  opacity:0;transition:opacity .2s;
}
.progress-bar-bg:hover .progress-bar-fill::after{opacity:1;}
.time-row{
  display:flex;justify-content:space-between;
  margin-top:8px;font-size:12px;color:var(--muted2);
}

/* Controls */
.controls-section{
  padding:16px 24px 0;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.ctrl-side{display:flex;align-items:center;gap:4px;}

.ctrl-btn{
  background:none;border:none;cursor:pointer;
  color:var(--muted);padding:10px;border-radius:50%;
  transition:color .2s,background .15s,transform .15s;
}
.ctrl-btn:active{transform:scale(.88);}
.ctrl-btn.active{color:var(--red);}
.ctrl-btn:hover{background:rgba(255,255,255,.06);}

.prev-next-btn{
  background:none;border:none;cursor:pointer;
  color:var(--white);padding:10px;border-radius:50%;
  transition:transform .15s,background .15s;
}
.prev-next-btn:active{transform:scale(.88);}
.prev-next-btn:hover{background:rgba(255,255,255,.06);}

.play-main-btn{
  width:68px;height:68px;border-radius:50%;
  background:linear-gradient(135deg,var(--red),var(--red-light));
  border:none;cursor:pointer;color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 28px rgba(219,41,85,.45);
  transition:transform .15s,box-shadow .2s;
}
.play-main-btn:active{transform:scale(.93);box-shadow:0 4px 14px rgba(219,41,85,.3);}

/* Extra row: volume + actions */
.extra-row{
  padding:14px 28px 0;
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
.vol-icon{color:var(--muted2);flex-shrink:0;}
.volume-slider{
  flex:1;-webkit-appearance:none;appearance:none;
  height:4px;background:rgba(255,255,255,.12);border-radius:2px;outline:none;cursor:pointer;
}
.volume-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--white);cursor:pointer;
}

/* Feature pills row */
.pills-row{
  padding:12px 28px 0;
  display:flex;gap:8px;align-items:center;
  flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
.pills-row::-webkit-scrollbar{display:none;}
.pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);
  border-radius:20px;padding:5px 12px;
  font-size:12px;font-weight:500;color:var(--muted);
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:all .2s;font-family:var(--font);
}
.pill:active{transform:scale(.96);}
.pill.active{
  background:rgba(219,41,85,.15);
  border-color:rgba(219,41,85,.4);
  color:var(--red-light);
}
.pill svg{width:13px;height:13px;flex-shrink:0;}

/* Sleep indicator */
.sleep-ind{
  display:none;align-items:center;gap:5px;
  font-size:12px;color:var(--red);font-weight:600;
}
.sleep-ind.visible{display:flex;}

/* ══════════════════════════════════════
   QUEUE PANEL
══════════════════════════════════════ */
.queue-panel{
  position:fixed;inset:0;z-index:150;
  background:var(--bg2);
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.32,.85,.45,1);
  display:flex;flex-direction:column;
  max-width:430px;left:50%;margin-left:-215px;
}
@media(max-width:430px){.queue-panel{margin-left:0;left:0;}}
.queue-panel.open{transform:translateY(0);}
.queue-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:52px 24px 16px;flex-shrink:0;
}
.queue-header h2{font-size:22px;font-weight:700;}
.queue-close{
  background:var(--surface);border:none;border-radius:50%;
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--muted);
}
.queue-list{flex:1;overflow-y:auto;padding:0 0 40px;scrollbar-width:none;}
.queue-list::-webkit-scrollbar{display:none;}
.queue-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 24px;cursor:pointer;transition:background .15s;
}
.queue-item:active{background:var(--surface);}
.queue-item.now{background:rgba(219,41,85,.1);}
.queue-item .qi-num{width:22px;text-align:center;font-size:12px;color:var(--muted2);flex-shrink:0;}
.queue-item.now .qi-num{display:none;}
.queue-dot{width:8px;height:8px;border-radius:50%;background:var(--red);display:none;flex-shrink:0;}
.queue-item.now .queue-dot{display:block;}
.queue-item .qi-thumb{
  width:42px;height:42px;border-radius:8px;
  background:var(--surface2);overflow:hidden;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.queue-item .qi-thumb img{width:100%;height:100%;object-fit:cover;}
.queue-item .qi-thumb svg{width:16px;height:16px;color:var(--muted2);}
.queue-item .qi-info{flex:1;min-width:0;}
.queue-item .qi-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.queue-item.now .qi-title{color:var(--red-light);}
.queue-item .qi-artist{font-size:12px;color:var(--muted);}
.queue-item .qi-dur{font-size:12px;color:var(--muted2);flex-shrink:0;}

/* ══════════════════════════════════════
   MODALS (sleep, speed)
══════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(5,8,22,.75);
  display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(8px);
}
.modal-overlay.open{display:flex;}
.modal-sheet{
  background:var(--bg2);border-radius:24px 24px 0 0;
  padding:24px 24px calc(48px + var(--safe-bottom));
  width:100%;max-width:430px;
  border-top:1px solid rgba(255,255,255,.07);
}
.modal-handle{width:36px;height:4px;background:var(--surface);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;}

.timer-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.timer-opt{
  padding:14px;border-radius:14px;background:var(--surface);
  border:2px solid transparent;cursor:pointer;text-align:center;
  transition:all .2s;font-family:var(--font);color:var(--white);
}
.timer-opt .t-min{font-size:22px;font-weight:700;display:block;}
.timer-opt .t-lbl{font-size:12px;color:var(--muted);display:block;margin-top:2px;}
.timer-opt.active{border-color:var(--red);background:rgba(219,41,85,.12);}
.timer-opt:active{transform:scale(.97);}
.sleep-cancel{
  margin-top:14px;width:100%;padding:14px;
  border-radius:14px;background:none;
  border:1.5px solid var(--surface);
  color:var(--muted);font-family:var(--font);font-size:15px;
  cursor:pointer;transition:all .2s;
}
.sleep-cancel:active{background:var(--surface);}

.speed-options{display:flex;flex-wrap:wrap;gap:10px;}
.speed-opt{
  flex:1;min-width:80px;padding:14px;
  border-radius:14px;background:var(--surface);
  border:2px solid transparent;cursor:pointer;text-align:center;
  transition:all .2s;font-family:var(--font);color:var(--white);
  font-size:16px;font-weight:600;
}
.speed-opt.active{border-color:var(--red);background:rgba(219,41,85,.12);color:var(--red);}
.speed-opt:active{transform:scale(.97);}
</style>
</head>

<script>
// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
const songs = [];
let currentIdx   = -1;
let isPlaying    = false;
let isShuffle    = false;
let isRepeat     = false;
let isCrossfade  = false;
let filterMode   = 'all';
let currentSearch = '';
let playbackRate = 1;
let sleepTimer   = null;
let sleepEndsAt  = null;
let sleepInterval = null;
let likedSongs   = new Set();

// Crossfade
let crossfadeTimer = null;
const CROSSFADE_SEC = 5;

// Seek touch
let seekDragging = false;

const audio = new Audio();
audio.volume = 0.8;

// ══════════════════════════════════════
//  AUDIO EVENTS
// ══════════════════════════════════════
audio.addEventListener('timeupdate', () => {
  updateProgress();
  if (isCrossfade && audio.duration && audio.currentTime >= audio.duration - CROSSFADE_SEC) {
    startCrossfade();
  }
});
audio.addEventListener('ended', onEnded);
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('totalTime').textContent = fmtTime(audio.duration);
  if (songs[currentIdx]) songs[currentIdx].duration = audio.duration;
  updateStatsBar();
});
audio.addEventListener('play',  () => updatePlayIcons(true));
audio.addEventListener('pause', () => updatePlayIcons(false));

// Inicializamos la vista vacía de una vez
renderSongs();

// ══════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════
function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ':' + (sec<10?'0':'') + sec;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.remove('show'), 2400);
}

// ══════════════════════════════════════
//  FILE LOADING
// ══════════════════════════════════════
function processFiles(files) {
  const audioFiles = Array.from(files).filter(f =>
    f.type.startsWith('audio/') || /\.(mp3|wav|flac|ogg|aac|m4a|opus|wma)$/i.test(f.name));
  if (!audioFiles.length) { showToast('Sin archivos de audio'); return; }

  const lb = document.getElementById('loadBar');
  const lbf = document.getElementById('loadBarFill');
  lb.classList.add('visible');
  let loaded = 0;

  audioFiles.forEach((f, i) => {
    const url = URL.createObjectURL(f);
    const raw = f.name.replace(/\.[^/.]+$/, '');
    const parts = raw.split(' - ');
    const artist = parts.length > 1 ? parts[0].trim() : 'Desconocido';
    const title  = parts.length > 1 ? parts.slice(1).join(' - ').trim() : raw;
    const song = { url, title, artist, album:'', duration:null, file:f, cover:null, addedAt:Date.now()+i };
    songs.push(song);

    readID3Cover(f, songs.length - 1, () => {
      loaded++;
      lbf.style.width = (loaded / audioFiles.length * 100) + '%';
      if (loaded === audioFiles.length) {
        setTimeout(() => { lb.classList.remove('visible'); lbf.style.width='0%'; }, 500);
        renderSongs();
        updateStatsBar();
        showToast(`✓ ${audioFiles.length} canción${audioFiles.length>1?'es':''} cargada${audioFiles.length>1?'s':''}`);
      }
    });
  });
  renderSongs();
}

function readID3Cover(file, idx, cb) {
  if (!file.name.toLowerCase().endsWith('.mp3')) { cb(); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try { const c = extractID3Cover(new Uint8Array(e.target.result)); if(c) songs[idx].cover = c; } catch(_){}
    cb();
  };
  reader.onerror = cb;
  reader.readAsArrayBuffer(file.slice(0, 200000));
}

function extractID3Cover(buf) {
  if (buf[0]!==0x49||buf[1]!==0x44||buf[2]!==0x33) return null;
  const ver = buf[3];
  let pos = 10;
  const tagSize = ((buf[6]&0x7f)<<21)|((buf[7]&0x7f)<<14)|((buf[8]&0x7f)<<7)|(buf[9]&0x7f);
  while (pos < tagSize && pos+10 < buf.length) {
    const id = String.fromCharCode(buf[pos],buf[pos+1],buf[pos+2],buf[pos+3]);
    const sz = ver>=4
      ? ((buf[pos+4]&0x7f)<<21)|((buf[pos+5]&0x7f)<<14)|((buf[pos+6]&0x7f)<<7)|(buf[pos+7]&0x7f)
      : (buf[pos+4]<<24)|(buf[pos+5]<<16)|(buf[pos+6]<<8)|buf[pos+7];
    if (sz<=0||sz>tagSize) break;
    if (id==='APIC') {
      let i = pos+10+1; // skip encoding
      while(i<buf.length&&buf[i]!==0) i++; i++; // mime
      i++; // pic type
      while(i<buf.length&&buf[i]!==0) i++; i++; // desc
      return URL.createObjectURL(new Blob([buf.slice(i,pos+10+sz)]));
    }
    pos += 10 + sz;
  }
  return null;
}

document.getElementById('fileInput').addEventListener('change', e => { processFiles(e.target.files); e.target.value=''; });
document.getElementById('folderInput').addEventListener('change', e => { processFiles(e.target.files); e.target.value=''; });
document.getElementById('searchInput').addEventListener('input', e => { currentSearch=e.target.value.toLowerCase(); renderSongs(); });

// ── Drag & drop ──
let dragCnt = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); dragCnt++; document.getElementById('dropOverlay').classList.add('visible'); });
document.addEventListener('dragleave', () => { if(--dragCnt<=0){dragCnt=0;document.getElementById('dropOverlay').classList.remove('visible');} });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault(); dragCnt=0;
  document.getElementById('dropOverlay').classList.remove('visible');
  const files = [];
  for (const item of (e.dataTransfer.items||[])) {
    if (item.kind==='file') {
      const entry = item.webkitGetAsEntry?.();
      if (entry?.isDirectory) { readDir(entry, files, () => processFiles(files)); return; }
      files.push(item.getAsFile());
    }
  }
  processFiles(files.length ? files : Array.from(e.dataTransfer.files));
});
function readDir(dir, files, done) {
  dir.createReader().readEntries(entries => {
    let p = entries.length; if(!p){done();return;}
    entries.forEach(e => {
      if(e.isFile) e.file(f=>{files.push(f);if(!--p)done();});
      else if(e.isDirectory) readDir(e,files,()=>{if(!--p)done();});
      else if(!--p) done();
    });
  });
}

// ══════════════════════════════════════
//  RENDER
// ══════════════════════════════════════
function filterSongs(mode, el) {
  filterMode = mode;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el?.classList.add('active');
  renderSongs();
}

function getFiltered() {
  let list = songs.map((s,i)=>({...s,origIdx:i}));
  if (filterMode==='liked')  list = list.filter(s=>likedSongs.has(s.origIdx));
  if (filterMode==='recent') list = [...list].sort((a,b)=>b.addedAt-a.addedAt).slice(0,30);
  if (filterMode==='az')     list = [...list].sort((a,b)=>a.title.localeCompare(b.title));
  if (currentSearch) list = list.filter(s=>
    s.title.toLowerCase().includes(currentSearch)||
    s.artist.toLowerCase().includes(currentSearch)||
    (s.album||'').toLowerCase().includes(currentSearch));
  return list;
}

function updateStatsBar() {
  const bar = document.getElementById('statsBar');
  if (!songs.length) { bar.style.display='none'; return; }
  bar.style.display='flex';
  document.getElementById('songCount').textContent = songs.length;
  const total = songs.reduce((a,s)=>a+(s.duration||0),0);
  const h=Math.floor(total/3600), m=Math.floor((total%3600)/60);
  document.getElementById('totalDurStat').textContent = h>0?`${h}h ${m}m`:`${m} min`;
}

function renderSongs() {
  const list = document.getElementById('songList');
  const filtered = getFiltered();

  if (!songs.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎵</div>
        <h3>Sin canciones aún</h3>
        <p>Cargá archivos sueltos o una carpeta entera</p>
        <div class="drop-hint">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
          También podés arrastrar archivos aquí
        </div>
      </div>
    `;
    return;
  }

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><h3>Sin resultados</h3><p>Intentá con otra búsqueda</p></div>`;
    return;
  }

  list.innerHTML = filtered.map((s,vi) => {
    const idx = s.origIdx;
    const playing = idx===currentIdx && isPlaying;
    const paused  = idx===currentIdx && !isPlaying && currentIdx!==-1;
    const liked   = likedSongs.has(idx);
    const cover   = s.cover
      ? `<img src="${s.cover}" alt="">`
      : `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>`;
    return `<div class="song-row${playing?' playing':''}${paused?' paused':''}" onclick="playSong(${idx})">
      <div class="song-num">${vi+1}</div>
      <div class="song-thumb">
        ${cover}
        <div class="playing-indicator"><div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div></div>
      </div>
      <div class="song-info">
        <div class="title">${esc(s.title)}</div>
        <div class="meta">${esc(s.artist)}${s.album?' · '+esc(s.album):''}</div>
      </div>
      <div class="song-right">
        <button class="song-like-mini${liked?' liked':''}" onclick="event.stopPropagation();toggleLikeSong(${idx})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="${liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <div class="song-duration">${s.duration?fmtTime(s.duration):'—'}</div>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════
//  PLAYBACK
// ══════════════════════════════════════
function playSong(idx) {
  if (crossfadeTimer) { clearTimeout(crossfadeTimer); crossfadeTimer=null; }
  currentIdx = idx;
  const song = songs[idx];
  audio.src = song.url;
  audio.playbackRate = playbackRate;
  audio.play();
  isPlaying = true;
  updatePlayerUI();
  updateMiniPlayer();
  renderSongs();
  document.getElementById('miniPlayer').classList.add('visible');
  document.getElementById('artwork').classList.add('playing');
  document.getElementById('artworkShadow').style.opacity = '1';
  updatePlayerBg(song.cover);
}

function togglePlay() {
  if (currentIdx===-1) return;
  if (isPlaying) {
    audio.pause(); isPlaying=false;
    document.getElementById('artwork').classList.remove('playing');
  } else {
    audio.play(); isPlaying=true;
    document.getElementById('artwork').classList.add('playing');
  }
  updatePlayIcons(isPlaying);
  renderSongs();
}

const PLAY_PATH  = `<path d="M8 5v14l11-7z"/>`;
const PAUSE_PATH = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;

function updatePlayIcons(playing) {
  isPlaying = playing ?? isPlaying;
  const p = isPlaying ? PAUSE_PATH : PLAY_PATH;
  document.getElementById('mainPlayIcon').innerHTML = p;
  document.getElementById('miniPlayIcon').innerHTML = p;
}

function updateProgress() {
  if (!audio.duration) return;
  const pct = audio.currentTime / audio.duration * 100;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('miniProgressFill').style.width = pct+'%';
  document.getElementById('currentTime').textContent = fmtTime(audio.currentTime);
}

function seekAudio(e) {
  if (!audio.duration) return;
  const bg = document.getElementById('progressBg');
  const pct = Math.max(0, Math.min(1, (e.clientX - bg.getBoundingClientRect().left) / bg.offsetWidth));
  audio.currentTime = pct * audio.duration;
}

// Touch seek
function seekTouchStart(e) { seekDragging=true; seekTouchMove(e); }
function seekTouchMove(e) {
  if (!seekDragging||!audio.duration) return;
  e.preventDefault();
  const bg = document.getElementById('progressBg');
  const pct = Math.max(0,Math.min(1,(e.touches[0].clientX-bg.getBoundingClientRect().left)/bg.offsetWidth));
  document.getElementById('progressFill').style.width = (pct*100)+'%';
  document.getElementById('currentTime').textContent = fmtTime(pct*audio.duration);
}
function seekTouchEnd(e) {
  if (!seekDragging||!audio.duration) return;
  seekDragging=false;
  const bg=document.getElementById('progressBg');
  const pct=Math.max(0,Math.min(1,(e.changedTouches[0].clientX-bg.getBoundingClientRect().left)/bg.offsetWidth));
  audio.currentTime=pct*audio.duration;
}

function onEnded() {
  if (isRepeat) { audio.currentTime=0; audio.play(); return; }
  nextSong();
}

function nextSong() {
  const currentList = getFiltered();
  if (!currentList.length) return;

  let currentIndexInFilter = currentList.findIndex(s => s.origIdx === currentIdx);
  if (currentIndexInFilter === -1) currentIndexInFilter = 0;

  const nextIndexInFilter = isShuffle 
    ? Math.floor(Math.random() * currentList.length) 
    : (currentIndexInFilter + 1) % currentList.length;

  playSong(currentList[nextIndexInFilter].origIdx);
}

function prevSong() {
  const currentList = getFiltered();
  if (!currentList.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  
  let currentIndexInFilter = currentList.findIndex(s => s.origIdx === currentIdx);
  if (currentIndexInFilter === -1) currentIndexInFilter = 0;

  const prevIndexInFilter = (currentIndexInFilter - 1 + currentList.length) % currentList.length;
  playSong(currentList[prevIndexInFilter].origIdx);
}

function toggleShuffle() {
  isShuffle=!isShuffle;
  document.getElementById('shuffleBtn').classList.toggle('active',isShuffle);
  showToast(isShuffle?'🔀 Aleatorio activado':'Aleatorio desactivado');
}
function toggleRepeat() {
  isRepeat=!isRepeat;
  document.getElementById('repeatBtn').classList.toggle('active',isRepeat);
  showToast(isRepeat?'🔁 Repetir activado':'Repetir desactivado');
}

function setVolume(v) { audio.volume=v/100; }

// ── Crossfade ──
function toggleCrossfade() {
  isCrossfade=!isCrossfade;
  document.getElementById('crossfadePill').classList.toggle('active',isCrossfade);
  showToast(isCrossfade?`🎚 Crossfade ${CROSSFADE_SEC}s activado`:'Crossfade desactivado');
}
function startCrossfade() {
  if (crossfadeTimer) return;
  const remaining = audio.duration - audio.currentTime;
  if (remaining > CROSSFADE_SEC) return;
  // Fade out current
  const steps = 20;
  const interval = (remaining*1000)/steps;
  const startVol = audio.volume;
  let step = 0;
  crossfadeTimer = setInterval(() => {
    step++;
    audio.volume = Math.max(0, startVol*(1-step/steps));
    if (step>=steps) {
      clearInterval(crossfadeTimer); crossfadeTimer=null;
      audio.volume = startVol;
      nextSong();
    }
  }, interval);
}

// ── Like ──
function toggleLike() {
  if (currentIdx===-1) return;
  toggleLikeSong(currentIdx);
  document.getElementById('likeBtn').classList.toggle('liked', likedSongs.has(currentIdx));
}
function toggleLikeSong(idx) {
  if (likedSongs.has(idx)) likedSongs.delete(idx);
  else { likedSongs.add(idx); showToast('❤️ Agregada a favoritas'); }
  renderSongs();
  if (idx===currentIdx) document.getElementById('likeBtn').classList.toggle('liked',likedSongs.has(idx));
}

// ── Speed ──
function setSpeed(rate,el) {
  playbackRate=rate; audio.playbackRate=rate;
  document.querySelectorAll('.speed-opt').forEach(b=>b.classList.remove('active'));
  el?.classList.add('active');
  document.getElementById('speedPillLabel').textContent=rate+'×';
  document.getElementById('speedPill').classList.toggle('active',rate!==1);
  closeSpeedModal();
  showToast('⚡ Velocidad: '+rate+'×');
}
function openSpeedModal(){document.getElementById('speedModal').classList.add('open');}
function closeSpeedModal(){document.getElementById('speedModal').classList.remove('open');}

// ── Sleep ──
function setSleepTimer(min,el) {
  if(sleepTimer) clearTimeout(sleepTimer);
  if(sleepInterval) clearInterval(sleepInterval);
  document.querySelectorAll('.timer-opt').forEach(b=>b.classList.remove('active'));
  el?.classList.add('active');
  sleepEndsAt = Date.now()+min*60000;
  sleepTimer = setTimeout(()=>{
    audio.pause(); isPlaying=false; updatePlayIcons(false); renderSongs();
    document.getElementById('artwork').classList.remove('playing');
    document.getElementById('sleepPill').classList.remove('active');
    document.getElementById('sleepPillLabel').textContent='Sleep';
    clearInterval(sleepInterval);
    showToast('😴 Música pausada');
  }, min*60000);
  document.getElementById('sleepPill').classList.add('active');
  updateSleepPill();
  sleepInterval = setInterval(updateSleepPill,1000);
  closeSleepModal();
  showToast(`⏰ Sleep en ${min} min`);
}
function updateSleepPill() {
  if(!sleepEndsAt) return;
  const rem = Math.max(0,sleepEndsAt-Date.now());
  const m=Math.floor(rem/60000), s=Math.floor((rem%60000)/1000);
  document.getElementById('sleepPillLabel').textContent=m+':'+(s<10?'0':'')+s;
}
function cancelSleepTimer() {
  if(sleepTimer) clearTimeout(sleepTimer);
  if(sleepInterval) clearInterval(sleepInterval);
  sleepTimer=null; sleepEndsAt=null;
  document.getElementById('sleepPill').classList.remove('active');
  document.getElementById('sleepPillLabel').textContent='Sleep';
  document.querySelectorAll('.timer-opt').forEach(b=>b.classList.remove('active'));
  closeSleepModal(); showToast('Timer cancelado');
}
function openSleepModal(){document.getElementById('sleepModal').classList.add('open');}
function closeSleepModal(){document.getElementById('sleepModal').classList.remove('open');}

// ── Queue ──
function renderQueue() {
  const list = document.getElementById('queueList');
  const currentList = getFiltered();
  
  if (!currentList.length) {
    list.innerHTML='<div style="padding:48px;text-align:center;color:var(--muted2);font-size:14px;">Sin canciones</div>';
    return;
  }
  
  list.innerHTML = currentList.map((s,i) => {
    const cur = s.origIdx === currentIdx;
    const cover = s.cover
      ? `<img src="${s.cover}" alt="">`
      : `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>`;
    return `<div class="queue-item${cur?' now':''}" onclick="playSong(${s.origIdx});closeQueue()">
      <div class="qi-num">${i+1}</div>
      <div class="queue-dot"></div>
      <div class="qi-thumb">${cover}</div>
      <div class="qi-info">
        <div class="qi-title">${esc(s.title)}</div>
        <div class="qi-artist">${esc(s.artist)}</div>
      </div>
      <div class="qi-dur">${s.duration?fmtTime(s.duration):'—'}</div>
    </div>`;
  }).join('');
  
  setTimeout(()=>{
    const cur=list.querySelector('.now');
    cur?.scrollIntoView({block:'center',behavior:'smooth'});
  },120);
}
function showQueue(){renderQueue();document.getElementById('queuePanel').classList.add('open');}
function closeQueue(){document.getElementById('queuePanel').classList.remove('open');}

// ── Dynamic player background ──
function updatePlayerBg(coverUrl) {
  const bg = document.getElementById('playerBg');
  if (coverUrl) {
    bg.style.backgroundImage = `url(${coverUrl})`;
    bg.classList.add('has-cover');
  } else {
    bg.classList.remove('has-cover');
    bg.style.backgroundImage = '';
  }
}

// ── Player UI update ──
function updatePlayerUI() {
  const s = songs[currentIdx];
  if (!s) return;

  // Title
  const titleEl = document.getElementById('playerTitle');
  titleEl.textContent = s.title;
  titleEl.classList.toggle('scrolling', s.title.length > 20);

  document.getElementById('playerArtist').textContent = s.artist;
  document.getElementById('playerAlbum').textContent  = s.album||'';
  document.getElementById('likeBtn').classList.toggle('liked', likedSongs.has(currentIdx));
  updatePlayIcons(true);

  // Artwork
  const art = document.getElementById('artwork');
  const existing = art.querySelector('img');
  if (existing) existing.remove();
  const icon = document.getElementById('artworkIcon');
  if (s.cover) {
    icon.style.display='none';
    const img = document.createElement('img');
    img.src=s.cover; img.alt='';
    art.appendChild(img);
  } else {
    icon.style.display='';
  }
}

function updateMiniPlayer() {
  const s = songs[currentIdx];
  if (!s) return;
  document.getElementById('miniTitle').textContent  = s.title;
  document.getElementById('miniArtist').textContent = s.artist;
  updatePlayIcons(true);
  // mini thumb
  const thumb = document.getElementById('miniThumb');
  const existing = thumb.querySelector('img');
  if (existing) existing.remove();
  const icon = thumb.querySelector('svg');
  if (s.cover) {
    icon.style.display='none';
    const img=document.createElement('img'); img.src=s.cover; img.alt='';
    thumb.appendChild(img);
  } else {
    icon.style.display='';
  }
}

// ── Navigation ──
function showPlayer() {
  document.getElementById('libScreen').classList.remove('active');
  document.getElementById('playerScreen').classList.add('active');
  document.getElementById('miniPlayer').classList.remove('visible');
}
function showLib() {
  document.getElementById('playerScreen').classList.remove('active');
  document.getElementById('libScreen').classList.add('active');
  if (currentIdx!==-1) document.getElementById('miniPlayer').classList.add('visible');
}

// ── Swipe on artwork ──
let tx=0,ty=0;
document.getElementById('artwork').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.getElementById('artwork').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=Math.abs(e.changedTouches[0].clientY-ty);
  if(Math.abs(dx)>60&&dy<50){if(dx<0)nextSong();else prevSong();}
});

// ── Keyboard ──
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();if(currentIdx!==-1)togglePlay();}
  if(e.code==='ArrowRight') nextSong();
  if(e.code==='ArrowLeft')  prevSong();
  if(e.code==='KeyL'&&currentIdx!==-1) toggleLike();
  if(e.code==='KeyS') toggleShuffle();
});
</script>
